services:
  - type: web
    name: craftworldcentre-backend
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_VERSION
        value: v1
      - key: DB_HOST
        value: 144.76.18.104  # Your external database IP
      - key: DB_PORT
        value: 3306           # Your external database port
      - key: DB_USER
        value: nigeriag_craftw_user  # Your external database user
      - key: DB_PASSWORD
        sync: false                  # Keep this secure
      - key: DB_NAME
        value: nigeriag_craftw_db    # Your external database name
      - key: DB_CONNECTION_LIMIT
        value: 10
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: craftworldcentre
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        value: pk_test_114c21fffccc16b3ef3582d43192e6a5841c48dd
      - key: COOKIE_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://your-frontend-project.vercel.app  # Replace with your actual Vercel URL
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-project.vercel.app  # Replace with your actual Vercel URL
      - key: BACKEND_URL
        value: https://your-backend-project.onrender.com # Replace with your Render backend URL